<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riff AI - Dibuat oleh Riffcodex</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(180deg, #1a1a1a 0%, #121212 100%);
      color: #ececec;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 16px;
      text-align: center;
      border-bottom: 1px solid #2a2a2a;
      font-weight: 600;
      background: rgba(18,18,18,0.8);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header span { font-size: 12px; opacity: 0.6; font-weight: 400; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

.msg {
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      gap: 14px;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

.avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #10a37f, #1a7f64);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(16,163,127,0.3);
    }

.user.avatar {
      background: linear-gradient(135deg, #5436da, #3d26a0);
      box-shadow: 0 2px 8px rgba(84,54,218,0.3);
    }

.text {
      line-height: 1.7;
      white-space: pre-wrap;
      padding-top: 4px;
      font-size: 15px;
    }

    #form {
      padding: 16px 16px 20px;
      border-top: 1px solid #2a2a2a;
      background: rgba(18,18,18,0.8);
      backdrop-filter: blur(10px);
    }

    #input-wrap {
      max-width: 800px;
      margin: 0 auto;
      position: relative;
      background: #2a2a2a;
      border-radius: 16px;
      border: 1px solid #3a3a3a;
      transition: all 0.2s;
    }

    #input-wrap:focus-within {
      border-color: #10a37f;
      box-shadow: 0 0 0 2px rgba(16,163,127,0.2);
    }

    #input {
      width: 100%;
      padding: 14px 50px 14px 18px;
      border-radius: 16px;
      border: none;
      background: transparent;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      max-height: 200px;
      outline: none;
    }

    #send {
      position: absolute;
      right: 8px;
      bottom: 8px;
      background: #10a37f;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      cursor: pointer;
      color: #fff;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    #send:hover:not(:disabled) {
      background: #0d8c6d;
      transform: scale(1.05);
    }

    #send:disabled {
      background: #444;
      cursor: not-allowed;
      opacity: 0.5;
    }

    #status {
      text-align: center;
      padding: 12px;
      font-size: 14px;
      color: #9b9b9b;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    footer {
      text-align: center;
      padding: 12px;
      font-size: 12px;
      color: #666;
      border-top: 1px solid #2a2a2a;
      background: rgba(18,18,18,0.8);
    }

    footer a {
      color: #10a37f;
      text-decoration: none;
      transition: 0.2s;
    }

    footer a:hover {
      color: #19c37d;
      text-decoration: underline;
    }

   .typing {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10a37f;
      animation: typing 1.4s infinite;
      margin-left: 4px;
    }

    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; }
      30% { opacity: 1; }
    }
  </style>
</head>
<body>
  <header>Riff AI <span>by Riffcodex</span></header>
  <div id="chat"></div>
  <div id="status">Loading model ~500MB... Sabar bro, pertama doang</div>
  <form id="form">
    <div id="input-wrap">
      <textarea id="input" rows="1" placeholder="Tanya Riff AI..." disabled></textarea>
      <button id="send" type="submit" disabled>↑</button>
    </div>
  </form>
  <footer>
    © 2026 Riff AI | Dibuat oleh <a href="https://github.com/Riffcodex" target="_blank">Riffcodex</a>
  </footer>

  <script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const form = document.getElementById("form");
    const status = document.getElementById("status");

    function addMsg(role, text) {
      const msg = document.createElement("div");
      msg.className = `msg ${role}`;
      msg.innerHTML = `
        <div class="avatar">${role === 'user'? 'U' : 'R'}</div>
        <div class="text">${text}</div>
      `;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
      return msg;
    }

    const engine = await CreateMLCEngine("Llama-3.2-1B-Instruct-q4f16_1-MLC", {
      initProgressCallback: (p) => { status.textContent = p.text; }
    });

    status.remove();
    input.disabled = false;
    send.disabled = false;
    addMsg('ai', 'Halo bro, gw Riff AI. Dibuat sama Riffcodex. Ada yang bisa gw bantu?');
    input.focus();

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = input.scrollHeight + 'px';
    });

    form.onsubmit = async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      addMsg('user', text);
      input.value = '';
      input.style.height = 'auto';
      input.disabled = true;
      send.disabled = true;

      let aiMsg = addMsg('ai', '<span class="typing"></span>');
      let aiText = aiMsg.querySelector('.text');
      aiText.innerHTML = '';

      const reply = await engine.chat.completions.create({
        messages: [{ role: "user", content: text }],
        stream: true
      });

      for await (const chunk of reply) {
        const delta = chunk.choices[0]?.delta?.content || '';
        aiText.textContent += delta;
        chat.scrollTop = chat.scrollHeight;
      }

      input.disabled = false;
      send.disabled = false;
      input.focus();
    };
  </script>
</body>
</html>
